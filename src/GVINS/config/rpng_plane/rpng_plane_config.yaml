%YAML:1.0


imu_topic: "/d455/imu"
image_topic: "/d455/color/image_raw"
output_dir: "~/new_gvins_ws/output/"


model_type: PINHOLE
camera_name: camera
image_width: 848
image_height: 480
distortion_parameters:
   k1: -0.045761895748285604
   k2: 0.03423951132164367
   p1: -0.00040139057556727315
   p2: 0.000431371425853453
projection_parameters:
   fx: 416.85223429743274
   fy: 414.92069080087543
   cx: 421.02459311003213
   cy: 237.76180565241077


gnss_enable: 0 
gnss_meas_topic: "/ublox_driver/range_meas"           # GNSS raw measurement topic
gnss_ephem_topic: "/ublox_driver/ephem"               # GPS, Galileo, BeiDou ephemeris
gnss_glo_ephem_topic: "/ublox_driver/glo_ephem"       # GLONASS ephemeris
gnss_iono_params_topic: "/ublox_driver/iono_params"   # GNSS broadcast ionospheric parameters 电离层参数topic
gnss_tp_info_topic: "/ublox_driver/time_pulse_info"   # PPS time info 秒脉冲时间输入topic
gnss_elevation_thres: 30            # satellite elevation threshold (degree)  卫星高度角阈值 
gnss_psr_std_thres: 2.0             # pseudo-range std threshold 伪距标准差阈值
gnss_dopp_std_thres: 2.0            # doppler std threshold 多普勒标准差阈值
gnss_track_num_thres: 20            # number of satellite tracking epochs before entering estimator 进入估计器前的卫星跟踪历元数
gnss_ddt_sigma: 0.1


gnss_local_online_sync: 0                     # if perform online synchronization betwen GNSS and local time 如果在线同步GNSS与本地时间
local_trigger_info_topic: "/external_trigger" # external trigger info of the local sensor, if `gnss_local_online_sync` is 1 当' gnss_local_online_sync ' = 1时，本地传感器外部触发信息
gnss_local_time_diff: 0.0                    # difference between GNSS and local time (s), if `gnss_local_online_sync` is 0 如果' gnss_local_online_sync '为0，则GNSS与本地时间的时间差(秒)

# 缺省电离层参数
gnss_iono_default_parameters: !!opencv-matrix 
   rows: 1
   cols: 8
   dt: d
   data: [0.1118E-07,  0.2235E-07, -0.4172E-06,  0.6557E-06,
          0.1249E+06, -0.4424E+06,  0.1507E+07, -0.2621E+06]

# Extrinsic parameter between IMU and Camera. 是否进行外参的在线标定
estimate_extrinsic: 0   # 0  Have an accurate extrinsic parameters. We will trust the following imu^R_cam, imu^T_cam, don't change it.
                        # 1  Have an initial guess about extrinsic parameters. We will optimize around your initial guess.
                        # 2  Don't know anything about extrinsic parameters. You don't need to give R,T. We will try to calibrate it. Do some rotation movement at beginning.                        
#If you choose 0 or 1, you should write down the following matrix.
#Rotation from camera frame to imu frame, imu^R_cam
extrinsicRotation: !!opencv-matrix
   rows: 3
   cols: 3
   dt: d
   data: [9.9996543980384522e-01, -7.3452195116216765e-03, 3.8944766308488753e-03,
           7.3423267791133369e-03, 9.9997275855905254e-01, 7.5655618912874448e-04,
           -3.8999276109757419e-03, -7.2793552234113343e-04, 9.9999213030628609e-01]
#Translation from camera frame to imu frame, imu^T_cam
extrinsicTranslation: !!opencv-matrix
   rows: 3
   cols: 1
   dt: d
   data: [2.7602825680059898e-02, 3.2786559038993001e-03, 2.3495324696976367e-02]

#feature traker paprameters
max_cnt: 150            # max feature number in feature tracking 追踪最大提取的特征点数量
min_dist: 30            # min distance between two features  两个特征点的距离
freq: 0                # frequence (Hz) of publish tracking result. At least 10Hz for good estimation. If set 0, the frequence will be same as raw image 设置追踪输出的频率
F_threshold: 1.0        # ransac threshold (pixel) ransac阈值
show_track: 1           # publish tracking image as topic 展示追踪图像
equalize: 1             # if image is too dark or light, trun on equalize to find enough features 如果图像太亮或者太暗均衡画寻找足够的特征点
fisheye: 0              # if using fisheye, trun on it. A circle mask will be loaded to remove edge noisy points

#optimization parameters
max_solver_time: 0.04  # max solver itration time (ms), to guarantee real time
max_num_iterations: 8   # max solver itrations, to guarantee real time
keyframe_parallax: 10.0 # keyframe selection threshold (pixel)

#imu parameters       The more accurate parameters you provide, the better performance
acc_n: 0.08          # accelerometer measurement noise standard deviation. #0.2   0.04
gyr_n: 0.004         # gyroscope measurement noise standard deviation.     #0.05  0.004
acc_w: 0.00004         # accelerometer bias random work noise standard deviation.  #0.02
gyr_w: 2.0e-6       # gyroscope bias random work noise standard deviation.     #4.0e-5
g_norm: 9.8065     # gravity magnitude

#unsynchronization parameters
estimate_td: 0       # online estimate time offset between camera and imu 在线估计相机和imu之间的时间偏移
td: 0.002524377913673846              # initial value of time offset. unit: s. readed image clock + td = real image clock (IMU clock) 时间偏移的初始值。单位:s.读图像时钟+ td =实图像时钟(IMU时钟) (OpenVINS: timeshift_cam_imu: 0.002524377913673846)

